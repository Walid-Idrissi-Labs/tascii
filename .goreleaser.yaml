version: 2


before:
  hooks:
    - go mod tidy

builds:
  - id: tascii
    binary: tascii

    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64


    ldflags:
      - -s -w -X github.com/walid-idrissi-labs/tascii/cmd.version={{.Version}}

archives:
  - format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"
    files:
      - LICENSE
      - README.md


nfpms:
  - id: packages
    package_name: tascii
    vendor: Walid
    homepage: https://github.com/walid-idrissi-labs/tascii
    maintainer: Your Name <walid.idrissi.labs@gmail.com>
    description: A fast, minimal terminal task manager with priorities and deadlines.
    license: MIT
    formats:
      - deb   
      - rpm   
    contents:
      - src: ./LICENSE
        dst: /usr/share/doc/tascii/LICENSE


brews:
  - name: tascii
    repository:
      owner: walid-idrissi-labs
      name: homebrew-tascii  
    commit_author:
      name: goreleaserbot
      email: bot@goreleaser.com
    homepage: https://github.com/walid-idrissi-labs/tascii
    description: A fast, minimal terminal task manager with priorities and deadlines.
    license: MIT
  #veritify binary works
    test: |
      system "#{bin}/tascii --version"

checksum:
  name_template: "checksums.txt"

#github releasses
release:
  github:
    owner: walid-idrissi-labs
    name: tascii
